<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC 폰끼리 통신</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; }
        button { padding: 10px 20px; cursor: pointer; }
        #log { background: #f4f4f4; padding: 10px; margin-top: 20px; min-height: 50px; }
    </style>
</head>
<body>
    <h2>WebRTC 텍스트 통신</h2>
    
    <div>
        <strong>내 ID:</strong> <span id="my-id">생성 중...</span>
    </div>
    <br>
    
    <input type="text" id="peer-id" placeholder="상대방 ID 입력">
    <button onclick="connectToPeer()">연결하기</button>
    <hr>
    
    <input type="text" id="message" maxlength="5" placeholder="5글자 입력">
    <button onclick="sendMessage()">보내기</button>

    <div id="log"><strong>받은 메시지:</strong> <span id="received-msg"></span></div>

    <script>
        let peer = new Peer(); // PeerJS 서버를 통해 ID 자동 생성
        let conn;

        // 1. 내 ID 표시
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 2. 상대방이 나에게 연결했을 때
        peer.on('connection', (c) => {
            conn = c;
            setupConnection();
        });

        // 3. 내가 상대방에게 연결할 때
        function connectToPeer() {
            const peerId = document.getElementById('peer-id').value;
            conn = peer.connect(peerId);
            setupConnection();
        }

        // 4. 연결 설정 및 데이터 수신
        function setupConnection() {
            conn.on('open', () => {
                alert("연결 성공!");
                conn.on('data', (data) => {
                    document.getElementById('received-msg').innerText = data;
                });
            });
        }

        // 5. 메시지 전송
        function sendMessage() {
            const msg = document.getElementById('message').value;
            if (conn && conn.open) {
                conn.send(msg);
                console.log("전송됨: " + msg);
            } else {
                alert("먼저 연결을 확인하세요.");
            }
        }
    </script>
</body>
</html>
