<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 블루투스 장기</title>
    <style>
        /* 기존 스타일 시트 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; justify-content: center; background: #2c3e50; padding: 10px; }
        .container { background: #f5f5f5; border-radius: 10px; padding: 15px; width: 100%; max-width: 500px; }
        .bt-controls { display: flex; gap: 10px; margin-bottom: 15px; }
        canvas { border: 2px solid #333; background: #d4a574; display: block; width: 100%; height: auto; cursor: pointer; }
        .status { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        .red { background: #ffe6e6; color: #c41e3a; }
        .blue { background: #e6f0ff; color: #003da5; }
        button { flex: 1; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; background: #3498db; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="bt-controls">
            <button id="btnConnect">기기 연결 (Bluetooth)</button>
            <button onclick="resetGame()">리셋</button>
        </div>
        
        <div id="turnDisplay" class="status red">연결 대기 중...</div>
        <canvas id="boardCanvas"></canvas>
        
        <div id="info" style="font-size: 12px; margin-top: 10px; color: #666;">
            * 두 대의 폰에서 접속 후 한쪽에서 연결을 시도하세요.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        let btCharacteristic;
        
        // 게임 상태
        let gameState = {
            turn: 'red',
            myRole: null, // 'red' 또는 'blue'
            selectedPos: null,
            board: []
        };

        const symbols = { 'R':'王','A':'士','E':'象','H':'馬','C':'車','P':'砲','S':'兵','r':'王','a':'士','e':'象','h':'馬','c':'차','p':'포','s':'졸' };

        // 블루투스 연결 설정
        document.getElementById('btnConnect').addEventListener('click', async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['0000ffe0-0000-1000-8000-00805f9b34fb']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('0000ffe0-0000-1000-8000-00805f9b34fb');
                btCharacteristic = await service.getCharacteristic('0000ffe1-0000-1000-8000-00805f9b34fb');
                
                await btCharacteristic.startNotifications();
                btCharacteristic.addEventListener('characteristicvaluechanged', (event) => {
                    const data = new TextDecoder().decode(event.target.value);
                    const [fr, fc, tr, tc] = data.split(',').map(Number);
                    handleRemoteMove(fr, fc, tr, tc);
                });

                gameState.myRole = 'red'; // 연결 주도자가 빨간색(선)
                document.getElementById('info').innerText = "내 역할: 🔴 빨간색(한)";
                updateTurnDisplay();
            } catch (err) { console.error(err); }
        });

        function handleRemoteMove(fr, fc, tr, tc) {
            if (!gameState.myRole) {
                gameState.myRole = 'blue'; // 데이터를 받은 쪽이 파란색(후)
                document.getElementById('info').innerText = "내 역할: 🔵 파란색(초)";
            }
            movePiece(fr, fc, tr, tc, false);
        }

        async function sendMove(fr, fc, tr, tc) {
            if (btCharacteristic) {
                const data = new TextEncoder().encode(`${fr},${fc},${tr},${tc}`);
                await btCharacteristic.writeValue(data);
            }
        }

        // 보드 초기화
        function initBoard() {
            gameState.board = [
                ['c', 'h', 'e', 'a', 'r', 'a', 'e', 'h', 'c'],
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
                ['.', 'p', '.', '.', '.', '.', '.', 'p', '.'],
                ['s', '.', 's', '.', 's', '.', 's', '.', 's'],
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
                ['S', '.', 'S', '.', 'S', '.', 'S', '.', 'S'],
                ['.', 'P', '.', '.', '.', '.', '.', 'P', '.'],
                ['.', '.', '.', '.', '.', '.', '.', '.', '.'],
                ['C', 'H', 'E', 'A', 'R', 'A', 'E', 'H', 'C']
            ];
            resizeCanvas();
            draw();
        }

        function movePiece(fr, fc, tr, tc, isLocal) {
            gameState.board[tr][tc] = gameState.board[fr][fc];
            gameState.board[fr][fc] = '.';
            gameState.turn = gameState.turn === 'red' ? 'blue' : 'red';
            if (isLocal) sendMove(fr, fc, tr, tc);
            draw();
            updateTurnDisplay();
        }

        function isMyPiece(r, c) {
            const p = gameState.board[r][c];
            if (p === '.') return false;
            const isRed = p === p.toUpperCase();
            return (gameState.myRole === 'red' && isRed) || (gameState.myRole === 'blue' && !isRed);
        }

        canvas.addEventListener('click', (e) => {
            if (gameState.turn !== gameState.myRole) return; // 내 차례가 아니면 무시

            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (canvas.width / 9));
            const row = Math.floor((e.clientY - rect.top) / (canvas.height / 10));

            if (gameState.selectedPos) {
                const [sr, sc] = gameState.selectedPos;
                if (sr === row && sc === col) {
                    gameState.selectedPos = null;
                } else {
                    movePiece(sr, sc, row, col, true);
                    gameState.selectedPos = null;
                }
            } else if (isMyPiece(row, col)) {
                gameState.selectedPos = [row, col];
            }
            draw();
        });

        function draw() {
            const cw = canvas.width / 9;
            const ch = canvas.height / 10;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            for(let r=0; r<10; r++) {
                for(let c=0; c<9; c++) {
                    ctx.strokeStyle = "#8d6e63";
                    ctx.strokeRect(c*cw, r*ch, cw, ch);
                    const p = gameState.board[r][c];
                    if(p !== '.') {
                        ctx.fillStyle = p === p.toUpperCase() ? "#c41e3a" : "#003da5";
                        ctx.beginPath(); ctx.arc(c*cw+cw/2, r*ch+ch/2, cw*0.4, 0, 7); ctx.fill();
                        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
                        ctx.fillText(symbols[p], c*cw+cw/2, r*ch+ch/2+5);
                    }
                }
            }
            if(gameState.selectedPos) {
                ctx.strokeStyle = "yellow"; ctx.lineWidth = 3;
                ctx.strokeRect(gameState.selectedPos[1]*cw, gameState.selectedPos[0]*ch, cw, ch);
            }
        }

        function updateTurnDisplay() {
            const el = document.getElementById('turnDisplay');
            el.innerText = gameState.turn === 'red' ? "🔴 한(빨강) 차례" : "🔵 초(파랑) 차례";
            el.className = `status ${gameState.turn}`;
        }

        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 30, 450);
            canvas.width = size;
            canvas.height = size * 1.11;
        }

        function resetGame() { if(confirm("초기화할까요?")) initBoard(); }
        initBoard();
    </script>
</body>
</html>
