<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="번호판 인식">
    <title>번호판 인식</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 1rem;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }
        
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: #000;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 1.5rem;
        }
        
        .camera-section {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 1.5rem;
            border: 1px solid #e0e0e0;
        }
        
        #videoContainer {
            position: relative;
            width: 100%;
            padding-bottom: 75%;
            background: #000;
        }
        
        #video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        #canvasPreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
        }
        
        .video-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1a1a1a;
            color: #999;
            font-size: 14px;
            text-align: center;
            padding: 1rem;
        }
        
        .controls {
            padding: 1rem;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        button {
            flex: 1;
            min-width: 120px;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: white;
            color: #000;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        button:active {
            background: #f0f0f0;
            transform: scale(0.98);
        }
        
        button.primary {
            background: #3498db;
            color: white;
            border-color: #3498db;
        }
        
        button.primary:active {
            background: #2980b9;
        }
        
        button.danger {
            background: #e74c3c;
            color: white;
            border-color: #e74c3c;
        }
        
        button.danger:active {
            background: #c0392b;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .result-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid #e0e0e0;
            margin-bottom: 1.5rem;
            display: none;
        }
        
        .result-section.active {
            display: block;
        }
        
        .result-label {
            font-size: 13px;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .plate-number {
            font-size: 36px;
            font-weight: 700;
            color: #000;
            background: #fff8dc;
            padding: 1rem;
            border-radius: 8px;
            text-align: center;
            font-family: 'Courier New', monospace;
            letter-spacing: 2px;
            margin-bottom: 1rem;
            border: 2px solid #f0e68c;
        }
        
        .confidence {
            font-size: 13px;
            color: #666;
            margin-bottom: 1rem;
        }
        
        .history {
            border-top: 1px solid #e0e0e0;
            padding-top: 1rem;
        }
        
        .history-title {
            font-size: 13px;
            color: #999;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .history-item {
            background: #f5f5f5;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .history-time {
            color: #999;
            font-size: 12px;
        }
        
        .status-message {
            font-size: 13px;
            color: #999;
            text-align: center;
            min-height: 20px;
            margin: 1rem 0;
        }
        
        .status-message.loading {
            color: #3498db;
        }
        
        .status-message.error {
            color: #e74c3c;
        }
        
        .status-message.success {
            color: #27ae60;
        }
        
        .guide {
            background: #f0f8ff;
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid #3498db;
            font-size: 13px;
            color: #555;
            line-height: 1.6;
        }
        
        .guide strong {
            display: block;
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        @media (prefers-color-scheme: dark) {
            body {
                background: #1a1a1a;
            }
            
            h1 {
                color: #fff;
            }
            
            .subtitle {
                color: #ccc;
            }
            
            .camera-section,
            .result-section {
                background: #2d2d2d;
                border-color: #444;
            }
            
            button {
                background: #2d2d2d;
                color: #fff;
                border-color: #444;
            }
            
            button:active {
                background: #3d3d3d;
            }
            
            button.primary {
                background: #3498db;
                border-color: #3498db;
            }
            
            button.danger {
                background: #e74c3c;
                border-color: #e74c3c;
            }
            
            .plate-number {
                background: #3d3d00;
                color: #ffff00;
                border-color: #666600;
            }
            
            .confidence {
                color: #aaa;
            }
            
            .history-item {
                background: #3d3d3d;
                color: #fff;
            }
            
            .history-time {
                color: #999;
            }
            
            .guide {
                background: #1e3a5f;
                border-left-color: #3498db;
                color: #aaa;
            }
            
            .guide strong {
                color: #e0e0e0;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>번호판 인식</h1>
    <p class="subtitle">카메라로 번호판을 찍으면 텍스트를 인식합니다</p>
    
    <div class="camera-section">
        <div id="videoContainer">
            <video id="video" playsinline></video>
            <canvas id="canvasPreview"></canvas>
            <div class="video-placeholder" id="placeholder">카메라 초기화 중...</div>
        </div>
        <div class="controls">
            <button id="startBtn" class="primary">카메라 시작</button>
            <button id="captureBtn" class="primary" disabled>촬영</button>
            <button id="stopBtn" class="danger" disabled>중지</button>
        </div>
    </div>
    
    <div id="statusMessage" class="status-message"></div>
    
    <div id="resultSection" class="result-section">
        <div class="result-label">인식된 번호판</div>
        <div id="plateNumber" class="plate-number">---</div>
        <div id="confidence" class="confidence">신뢰도: --</div>
        
        <button id="copyBtn">복사</button>
        
        <div class="history">
            <div class="history-title">최근 인식 내역</div>
            <div id="historyList" class="history-list"></div>
        </div>
    </div>
    
    <div class="guide">
        <strong>📸 사용 방법</strong>
        1. "카메라 시작" 버튼 클릭<br>
        2. 카메라 접근 허용<br>
        3. 번호판을 프레임에 맞게 "촬영" 클릭<br>
        4. 인식된 번호판 확인
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/tesseract.js/5.0.4/tesseract.min.js"></script>
<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvasPreview');
const canvasCtx = canvas.getContext('2d');
const placeholder = document.getElementById('placeholder');
const startBtn = document.getElementById('startBtn');
const captureBtn = document.getElementById('captureBtn');
const stopBtn = document.getElementById('stopBtn');
const statusMessage = document.getElementById('statusMessage');
const resultSection = document.getElementById('resultSection');
const plateNumberEl = document.getElementById('plateNumber');
const confidenceEl = document.getElementById('confidence');
const copyBtn = document.getElementById('copyBtn');
const historyList = document.getElementById('historyList');

let stream = null;
let history = JSON.parse(localStorage.getItem('plateHistory') || '[]').slice(0, 10);
let currentPlate = '';

// 히스토리 업데이트 함수
function updateHistory() {
    historyList.innerHTML = '';
    history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-item';
        const time = new Date(item.time).toLocaleTimeString('ko-KR');
        div.innerHTML = `
            <span>${item.plate}</span>
            <span class="history-time">${time}</span>
        `;
        historyList.appendChild(div);
    });
}

// 파일 입력 요소 생성
const fileInput = document.createElement('input');
fileInput.type = 'file';
fileInput.accept = 'image/*';
fileInput.capture = 'environment';
fileInput.addEventListener('change', handleFileUpload);

// 카메라 시작
startBtn.addEventListener('click', async () => {
    try {
        statusMessage.textContent = '카메라 접근 중...';
        statusMessage.className = 'status-message loading';
        
        stream = await navigator.mediaDevices.getUserMedia({
            video: { 
                facingMode: 'environment',
                width: { ideal: 1280 },
                height: { ideal: 960 }
            }
        });
        
        video.srcObject = stream;
        video.style.display = 'block';
        placeholder.style.display = 'none';
        
        startBtn.disabled = true;
        captureBtn.disabled = false;
        stopBtn.disabled = false;
        
        statusMessage.textContent = '번호판을 프레임에 맞추고 촬영을 클릭하세요';
        statusMessage.className = 'status-message';
    } catch (error) {
        statusMessage.textContent = '카메라를 사용할 수 없습니다. 사진에서 인식해볼까요?';
        statusMessage.className = 'status-message error';
        captureBtn.textContent = '사진 선택';
        captureBtn.disabled = false;
        captureBtn.onclick = () => fileInput.click();
    }
});

// 파일 업로드 처리
function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (e) => {
        canvas.width = canvas.offsetWidth * 2;
        canvas.height = canvas.offsetHeight * 2;
        
        const img = new Image();
        img.onload = () => {
            canvasCtx.drawImage(img, 0, 0, canvas.width, canvas.height);
            recognizePlate();
        };
        img.src = e.target.result;
    };
    reader.readAsDataURL(file);
}

// 번호판 인식 함수 (분리)
async function recognizePlate() {
    canvas.style.display = 'block';
    video.style.display = 'none';
    
    captureBtn.disabled = true;
    statusMessage.textContent = '번호판 인식 중...';
    statusMessage.className = 'status-message loading';
    
    try {
        const imageData = canvas.toDataURL('image/jpeg');
        
        const result = await Tesseract.recognize(imageData, 'kor+eng', {
            logger: m => {
                if (m.status === 'recognizing') {
                    const progress = Math.round(m.progress * 100);
                    statusMessage.textContent = `인식 중... ${progress}%`;
                }
            }
        });
        
        const text = result.data.text.trim().toUpperCase().replace(/\s+/g, '');
        const confidence = Math.round(result.data.confidence);
        
        currentPlate = text;
        plateNumberEl.textContent = text || '인식 실패';
        confidenceEl.textContent = `신뢰도: ${confidence}%`;
        resultSection.classList.add('active');
        
        if (text) {
            history.unshift({
                plate: text,
                confidence: confidence,
                time: new Date().toISOString()
            });
            history = history.slice(0, 10);
            localStorage.setItem('plateHistory', JSON.stringify(history));
            updateHistory();
            
            statusMessage.textContent = '인식 완료!';
            statusMessage.className = 'status-message success';
        } else {
            statusMessage.textContent = '번호판을 인식하지 못했습니다. 다시 시도해주세요.';
            statusMessage.className = 'status-message error';
        }
        
        canvas.style.display = 'none';
        video.style.display = 'block';
        captureBtn.disabled = false;
    } catch (error) {
        statusMessage.textContent = '인식 오류: ' + error.message;
        statusMessage.className = 'status-message error';
        canvas.style.display = 'none';
        video.style.display = 'block';
        captureBtn.disabled = false;
    }
}

// 촬영 (카메라 방식)
captureBtn.addEventListener('click', async () => {
    // 카메라 사용 가능한 경우
    if (video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvasCtx.drawImage(video, 0, 0);
        recognizePlate();
    }
});

// 중지
stopBtn.addEventListener('click', () => {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
    }
    
    video.style.display = 'none';
    canvas.style.display = 'none';
    placeholder.style.display = 'flex';
    placeholder.textContent = '카메라가 중지되었습니다';
    
    startBtn.disabled = false;
    captureBtn.disabled = true;
    stopBtn.disabled = true;
    
    statusMessage.textContent = '';
});

// 복사
copyBtn.addEventListener('click', () => {
    if (currentPlate) {
        navigator.clipboard.writeText(currentPlate).then(() => {
            const original = copyBtn.textContent;
            copyBtn.textContent = '복사됨!';
            setTimeout(() => {
                copyBtn.textContent = original;
            }, 1500);
        });
    }
});

// 초기 히스토리 표시
updateHistory();

// 페이지 떠날 때 카메라 중지
window.addEventListener('beforeunload', () => {
    if (stream) {
        stream.getTracks().forEach(track => track.stop());
    }
});
</script>

</body>
</html>
