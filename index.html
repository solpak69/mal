<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>온라인 장기 - 실시간 동기화</title>
    <style>
        /* 기존 스타일 유지 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; display: flex; justify-content: center; background: #2c3e50; padding: 10px; }
        .container { background: #f5f5f5; border-radius: 10px; padding: 15px; width: 100%; max-width: 500px; }
        .controls { display: flex; gap: 5px; margin-bottom: 10px; }
        canvas { border: 2px solid #333; background: #d4a574; display: block; width: 100%; height: auto; cursor: pointer; }
        .status { padding: 10px; border-radius: 5px; text-align: center; font-weight: bold; margin-bottom: 10px; }
        .red { background: #ffe6e6; color: #c41e3a; }
        .blue { background: #e6f0ff; color: #003da5; }
        button { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; background: #3498db; color: white; font-size: 12px; }
        input { flex: 2; padding: 8px; border: 1px solid #ddd; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="controls">
            <input type="text" id="roomId" placeholder="방 제목 입력 (둘이 동일하게)">
            <button onclick="joinRoom()">방 입장</button>
            <button onclick="resetGame()">리셋</button>
        </div>
        
        <div id="turnDisplay" class="status red">방에 입장해 주세요</div>
        <canvas id="boardCanvas"></canvas>
        
        <div id="roleInfo" style="font-size: 11px; margin-top: 10px; color: #666; text-align: center;">
            상대방과 같은 방 제목을 입력하고 접속하세요.
        </div>
    </div>

    <script>
        const canvas = document.getElementById('boardCanvas');
        const ctx = canvas.getContext('2d');
        
        // 온라인 설정을 위한 변수
        let currentRoom = "";
        const API_URL = "https://api.jsonbin.io/v3/b/66180572e41b4d34e4e135be"; // 공용 테스트용 빈 (실제 서비스시 개인 API 키 권장)
        const MASTER_KEY = "$2a$10$Your_Key_Here"; // 실제 사용시 보안상 서버 필요하나, 학습용으로 구조만 구성

        let gameState = {
            turn: 'red',
            myRole: null, 
            selectedPos: null,
            lastMoveId: 0,
            board: []
        };

        const symbols = { 'R':'王','A':'士','E':'象','H':'馬','C':'車','P':'砲','S':'兵','r':'王','a':'士','e':'象','h':'馬','c':'차','p':'포','s':'졸' };

        // --- 온라인 동기화 로직 ---

        async function joinRoom() {
            const id = document.getElementById('roomId').value;
            if(!id) return alert("방 제목을 입력하세요");
            currentRoom = id;
            
            // 역할 정하기 (임시: 선착순은 아니며 수동 선택 혹은 랜덤 가능하지만 여기서는 선착순 방식)
            const response = await fetch(`${API_URL}/latest`);
            const data = await response.json();
            
            if(!data.record[currentRoom]) {
                gameState.myRole = 'red';
                updateOnlineData(true); // 방 생성
            } else {
                gameState.myRole = 'blue';
            }
            
            document.getElementById('roleInfo').innerText = `내 역할: ${gameState.myRole === 'red' ? '🔴 한' : '🔵 초'}`;
            setInterval(syncGame, 2000); // 2초마다 상대방 움직임 체크
        }

        async function updateOnlineData(isNew = false) {
            if(!currentRoom) return;
            
            const payload = {
                [currentRoom]: {
                    board: gameState.board,
                    turn: gameState.turn,
                    lastMove: Date.now()
                }
            };

            await fetch(API_URL, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
        }

        async function syncGame() {
            if(!currentRoom || gameState.turn === gameState.myRole) return;

            const response = await fetch(`${API_URL}/latest`);
            const data = await response.json();
            const roomData = data.record[currentRoom];

            if(roomData && roomData.turn === gameState.myRole) {
                gameState.board = roomData.board;
                gameState.turn = roomData.turn;
                draw();
                updateTurnDisplay();
            }
        }

        // --- 장기 게임 기본 로직[cite: 1] ---

        function initBoard() {
            gameState.board = [
                ['c','h','e','a','r','a','e','h','c'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','p','.','.','.','.','.','p','.'],
                ['s','.','s','.','s','.','s','.','s'],
                ['.','.','.','.','.','.','.','.','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['S','.','S','.','S','.','S','.','S'],
                ['.','P','.','.','.','.','.','P','.'],
                ['.','.','.','.','.','.','.','.','.'],
                ['C','H','E','A','R','A','E','H','C']
            ];
            resizeCanvas();
            draw();
        }

        function movePiece(fr, fc, tr, tc) {
            gameState.board[tr][tc] = gameState.board[fr][fc];
            gameState.board[fr][fc] = '.';
            gameState.turn = gameState.turn === 'red' ? 'blue' : 'red';
            draw();
            updateTurnDisplay();
            updateOnlineData(); // 온라인에 저장
        }

        canvas.addEventListener('click', (e) => {
            if (gameState.turn !== gameState.myRole) return; 

            const rect = canvas.getBoundingClientRect();
            const col = Math.floor((e.clientX - rect.left) / (canvas.width / 9));
            const row = Math.floor((e.clientY - rect.top) / (canvas.height / 10));

            if (gameState.selectedPos) {
                const [sr, sc] = gameState.selectedPos;
                if (sr !== row || sc !== col) {
                    movePiece(sr, sc, row, col);
                }
                gameState.selectedPos = null;
            } else {
                const p = gameState.board[row][col];
                if (p !== '.' && ((gameState.myRole === 'red' && p === p.toUpperCase()) || (gameState.myRole === 'blue' && p === p.toLowerCase()))) {
                    gameState.selectedPos = [row, col];
                }
            }
            draw();
        });

        function draw() {
            const cw = canvas.width / 9;
            const ch = canvas.height / 10;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for(let r=0; r<10; r++) {
                for(let c=0; c<9; c++) {
                    ctx.strokeStyle = "#8d6e63";
                    ctx.strokeRect(c*cw, r*ch, cw, ch);
                    const p = gameState.board[r][c];
                    if(p !== '.') {
                        ctx.fillStyle = p === p.toUpperCase() ? "#c41e3a" : "#003da5";
                        ctx.beginPath(); ctx.arc(c*cw+cw/2, r*ch+ch/2, cw*0.4, 0, 7); ctx.fill();
                        ctx.fillStyle = "#fff"; ctx.textAlign = "center";
                        ctx.fillText(symbols[p], c*cw+cw/2, r*ch+ch/2+5);
                    }
                }
            }
            if(gameState.selectedPos) {
                ctx.strokeStyle = "yellow"; ctx.lineWidth = 3;
                ctx.strokeRect(gameState.selectedPos[1]*cw, gameState.selectedPos[0]*ch, cw, ch);
            }
        }

        function updateTurnDisplay() {
            const el = document.getElementById('turnDisplay');
            el.innerText = gameState.turn === 'red' ? "🔴 한(빨강) 차례" : "🔵 초(파랑) 차례";
            el.className = `status ${gameState.turn}`;
        }

        function resizeCanvas() {
            const size = Math.min(window.innerWidth - 30, 450);
            canvas.width = size;
            canvas.height = size * 1.11;
        }

        initBoard();
    </script>
</body>
</html>
